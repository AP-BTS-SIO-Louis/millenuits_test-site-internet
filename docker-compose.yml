services:
  # 1. Conteneur d'initialisation (Récupération du code)
  init-code:
    image: alpine:latest
    command: >
      sh -c "apk add --no-cache git 
      && git clone https://github.com/AP-BTS-SIO-Louis/millenuits_test-site-internet.git /tmp/repo 
      && rm -rf /app/* && cp -r /tmp/repo/src/* /app/ 
      && chown -R 33:33 /app"
    volumes:
      - web_data:/app

  # 2. Serveur Web (Exécution de l'application)
  web:
    image: php:8.2-apache
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - web_data:/var/www/html
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER:-user_etudiant}
      - DB_PASSWORD=${DB_PASSWORD:-mdp_etudiant}
      - DB_NAME=${DB_NAME:-db_etudiant}
    depends_on:
      init-code:
        condition: service_completed_successfully
      db:
        condition: service_healthy

  # 3. Base de données
  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password_fort}
      MYSQL_DATABASE: ${DB_NAME:-db_etudiant}
      MYSQL_USER: ${DB_USER:-user_etudiant}
      MYSQL_PASSWORD: ${DB_PASSWORD:-mdp_etudiant}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  web_data:
  db_data: